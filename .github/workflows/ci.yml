name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts reads DATABASE_URL at config-load time via env(),
      # and that's evaluated even during `prisma generate` in postinstall
      # (not just during queries). Set a dummy value so install succeeds —
      # the value is never dialed in CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps matches what Vercel does (see vercel.json
        # installCommand) — keeps next-auth@beta happy with React 19.
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prisma migration safety check
        # --no-lock-timeout / --no-statement-timeout: these are pgfence policy
        # checks for SET statements at the top of every migration. Prisma
        # doesn't generate them, and editing already-applied migrations to
        # add them would break migrate deploy's history check, so these are
        # disabled. The real risk analysis (destructive drops, NOT NULL on
        # populated tables, unsafe renames) still runs.
        run: |
          shopt -s globstar
          npx -y @flvmnt/pgfence analyze --ci --max-risk medium \
            --no-lock-timeout --no-statement-timeout \
            prisma/migrations/**/migration.sql

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
